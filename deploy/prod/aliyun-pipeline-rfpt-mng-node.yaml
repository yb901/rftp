name: rfpt-mng-node

sources:
  my_repo:
    type: codeup
    name: rfpt
    endpoint: RFPT_CODEUP_ENDPOINT_PLACEHOLDER
    branch: main
    certificate:
      type: serviceConnection
      serviceConnection: RFPT_CODEUP_SERVICE_CONNECTION_PLACEHOLDER

stages:
  stage1:
    name: "管理端前端构建并推送镜像"
    jobs:
      build_and_push:
        name: "Build And Push"
        runsOn:
          group: RFPT_YUNXIAO_RUNNER_GROUP_PLACEHOLDER
          vm: true
        steps:
          build_push_step:
            name: "Build Push"
            step: Command
            with:
              run: |
                set -e
                cd frontend/rfpt-mng-node
                npm ci
                npm run build
                echo "$CR_PWD" | docker login --username "$CR_USER_NAME" --password-stdin "$ACR_REGISTRY"
                IMAGE_TAG="${CI_COMMIT_ID}-${BUILD_NUMBER}"
                IMAGE="${ACR_REGISTRY}/${ACR_NAMESPACE}/rfpt-mng-node:${IMAGE_TAG}"
                docker build -t "$IMAGE" -f Dockerfile .
                docker push "$IMAGE"
                echo "IMAGE=$IMAGE"

  stage2:
    name: "部署管理端前端到 ACK"
    jobs:
      deploy_to_ack:
        name: "Deploy To ACK"
        runsOn:
          group: RFPT_YUNXIAO_RUNNER_GROUP_PLACEHOLDER
          vm: true
        steps:
          render_manifest_step:
            name: "Render Manifest"
            step: Command
            with:
              run: |
                set -e
                IMAGE_TAG="${CI_COMMIT_ID}-${BUILD_NUMBER}"
                IMAGE="${ACR_REGISTRY}/${ACR_NAMESPACE}/rfpt-mng-node:${IMAGE_TAG}"
                MANIFEST_DIR=".manifest-rfpt-mng-node"
                MANIFEST_FILE="${MANIFEST_DIR}/rfpt-mng-node.yaml"
                mkdir -p "$MANIFEST_DIR"
                cp frontend/rfpt-mng-node/k8s/prod/rfpt-mng-node-deployment.yaml "$MANIFEST_FILE"
                printf '\n---\n' >> "$MANIFEST_FILE"
                cat frontend/rfpt-mng-node/k8s/prod/rfpt-mng-node-service.yaml >> "$MANIFEST_FILE"
                sed -i "s#RFPT_MNG_NODE_IMAGE_PLACEHOLDER#$IMAGE#g" "$MANIFEST_FILE"
                sed -i "s#APP_VERSION_PLACEHOLDER#$IMAGE_TAG#g" "$MANIFEST_FILE"
          kubectl_apply_step:
            name: "Kubectl Apply"
            step: KubectlApply
            with:
              kubernetesCluster: RFPT_ACK_CLUSTER_PLACEHOLDER
              kubectlVersion: "1.30.14"
              namespace: prod
              yamlPath: .manifest-rfpt-mng-node/rfpt-mng-node.yaml
              skipReplace: true
