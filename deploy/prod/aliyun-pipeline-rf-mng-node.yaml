name: rf-mng-node

sources:
  my_repo:
    type: codeup
    name: rfpt
    endpoint: https://codeup.aliyun.com/6a0e7b2c7b6e0a0129639206/rfpt/rfpt.git
    branch: main
    certificate:
      type: serviceConnection
      serviceConnection: dgqwgyszp67p6z61

stages:
  stage1:
    name: "管理后台前端构建、上传 OSS 并推送镜像"
    jobs:
      build_upload_push:
        name: "Build Upload Push"
        runsOn:
          group: private/PMCrDXq0zBgals4t
          vm: true
        steps:
          build_upload_push_step:
            name: "Build Upload Push"
            step: Command
            with:
              run: |
                echo "当前目录"
                pwd
                ls -la

                print_commit_summary() {
                  line() {
                    printf '%s\n' '============================================================'
                  }

                  short_commit() {
                    git rev-parse --short "$1" 2>/dev/null || printf '%s' "$1"
                  }

                  current_commit="${CI_COMMIT_ID:-$(git rev-parse HEAD)}"
                  previous_commit=""
                  for name in YUNXIAO_PRE_COMMIT_ID PRE_COMMIT_ID CI_PRE_COMMIT_ID PREVIOUS_COMMIT_ID LAST_SUCCESS_COMMIT_ID; do
                    value=$(eval "printf '%s' \"\${$name:-}\"")
                    if [ -n "$value" ] && git cat-file -e "$value^{commit}" 2>/dev/null; then
                      previous_commit="$value"
                      break
                    fi
                  done

                  if [ -z "$previous_commit" ]; then
                    previous_commit=$(printenv | awk -F= '
                      $1 ~ /(^|[._-])preCommitId$/ || $1 ~ /(^|[._-])PRE_COMMIT_ID$/ {
                        print $2
                        exit
                      }
                    ')
                  fi

                  if [ -n "$previous_commit" ] && ! git cat-file -e "$previous_commit^{commit}" 2>/dev/null; then
                    previous_commit=""
                  fi

                  if [ -z "$previous_commit" ] && git rev-parse HEAD~1 >/dev/null 2>&1; then
                    previous_commit=$(git rev-parse HEAD~1)
                  fi

                  branch_name="${CI_COMMIT_REF_NAME:-$(git rev-parse --abbrev-ref HEAD 2>/dev/null || printf 'unknown')}"
                  build_number="${BUILD_NUMBER:-unknown}"

                  line
                  printf '发布变更摘要\n'
                  printf '分支: %s\n' "$branch_name"
                  printf '构建号: %s\n' "$build_number"
                  printf '本次提交: %s (%s)\n' "$(short_commit "$current_commit")" "$current_commit"
                  if [ -n "$previous_commit" ]; then
                    printf '上次提交: %s (%s)\n' "$(short_commit "$previous_commit")" "$previous_commit"
                  else
                    printf '上次提交: 未获取到，展示最近 10 条提交\n'
                  fi

                  line
                  printf '提交列表:\n'
                  if [ -n "$previous_commit" ] && git merge-base --is-ancestor "$previous_commit" "$current_commit" 2>/dev/null; then
                    commit_range="$previous_commit..$current_commit"
                    git log "$commit_range" --date=format:'%Y-%m-%d %H:%M:%S %z' --pretty=format:'  - %h | %ad | %an | %s' --no-decorate
                  else
                    commit_range=""
                    git log -10 --date=format:'%Y-%m-%d %H:%M:%S %z' --pretty=format:'  - %h | %ad | %an | %s' --no-decorate
                  fi

                  printf '\n'
                  line
                  printf '变更文件:\n'
                  if [ -n "$commit_range" ]; then
                    changed_count=$(git diff --name-only "$previous_commit" "$current_commit" | wc -l | tr -d ' ')
                    if [ "$changed_count" -eq 0 ]; then
                      printf '  无文件变更\n'
                    else
                      git diff --name-status "$previous_commit" "$current_commit" | sed 's/^/  /' | head -200
                      if [ "$changed_count" -gt 200 ]; then
                        printf '  ... 共 %s 个文件，仅展示前 200 个\n' "$changed_count"
                      else
                        printf '  共 %s 个文件\n' "$changed_count"
                      fi
                    fi
                  else
                    git show --name-status --format='' "$current_commit" | sed 's/^/  /' | head -200
                  fi
                  line
                }
                print_commit_summary || true

                echo "检查变量"
                for name in MNG_API_BASE_URL CDN_BASE_URL OSS_ENDPOINT OSS_BUCKET OSS_ACCESS_KEY_ID OSS_ACCESS_KEY_SECRET CR_USER_NAME CR_PWD NGINX_IMAGE; do
                  if [ -z "$(eval echo \$$name)" ]; then
                    echo "$name 未配置"
                    exit 1
                  fi
                done

                echo "进入前端目录"
                cd frontend/rf-mng-node

                APP_CDN_NAME="rf-mng-node"
                CDN_BASE_URL="${CDN_BASE_URL%/}"
                APP_CDN_BASE_URL="${CDN_BASE_URL}/${APP_CDN_NAME}/"
                OSS_PREFIX="${APP_CDN_NAME}/"
                OSS_ASSETS_PATH="oss://${OSS_BUCKET}/${OSS_PREFIX}assets"
                OSS_FAVICON_PATH="oss://${OSS_BUCKET}/${OSS_PREFIX}favicon.png"
                OSS_ICONS_PATH="oss://${OSS_BUCKET}/${OSS_PREFIX}icons"
                export CDN_BASE_URL

                echo "管理后台静态资源配置"
                echo "CDN_BASE_URL=$CDN_BASE_URL"
                echo "APP_CDN_NAME=$APP_CDN_NAME"
                echo "APP_CDN_BASE_URL=$APP_CDN_BASE_URL"
                echo "OSS_BUCKET=$OSS_BUCKET"
                echo "OSS_PREFIX=$OSS_PREFIX"
                echo "OSS_ASSETS_PATH=$OSS_ASSETS_PATH"
                echo "OSS_FAVICON_PATH=$OSS_FAVICON_PATH"
                echo "OSS_ICONS_PATH=$OSS_ICONS_PATH"

                echo "加载 Node.js"
                if [ -n "$NODE_BIN_DIR" ]; then
                  export PATH="$NODE_BIN_DIR:$PATH"
                fi

                if ! command -v node >/dev/null 2>&1; then
                  export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
                  if [ -s "$NVM_DIR/nvm.sh" ]; then
                    . "$NVM_DIR/nvm.sh"
                    nvm use 22
                  else
                    echo "未找到 node，也未找到 nvm 初始化脚本: $NVM_DIR/nvm.sh"
                    echo "请确认云效构建机已安装 Node.js 22，或配置 NODE_BIN_DIR / NVM_DIR"
                    exit 1
                  fi
                fi

                echo "Node Version"
                node -v
                npm -v

                echo "安装依赖"
                npm ci

                echo "构建前端"
                npm run build

                echo "查看构建产物"
                ls -la dist
                ls -la dist/assets

                echo "检查 ossutil"
                if [ -n "$OSSUTIL_BIN" ]; then
                  OSSUTIL_CMD="$OSSUTIL_BIN"
                elif command -v ossutil >/dev/null 2>&1; then
                  OSSUTIL_CMD="$(command -v ossutil)"
                elif command -v ossutil64 >/dev/null 2>&1; then
                  OSSUTIL_CMD="$(command -v ossutil64)"
                else
                  echo "未找到 ossutil / ossutil64"
                  echo "请在云效构建机安装 ossutil，或配置 OSSUTIL_BIN 为可执行文件完整路径"
                  exit 1
                fi
                echo "OSSUTIL_CMD=$OSSUTIL_CMD"
                "$OSSUTIL_CMD" --version || true

                echo "配置 ossutil"
                "$OSSUTIL_CMD" config \
                  -e "$OSS_ENDPOINT" \
                  -i "$OSS_ACCESS_KEY_ID" \
                  -k "$OSS_ACCESS_KEY_SECRET"

                echo "上传 assets 到 OSS"
                "$OSSUTIL_CMD" cp -rf dist/assets "$OSS_ASSETS_PATH" \
                  --meta Cache-Control:max-age=31536000,public,immutable

                if [ -f dist/favicon.png ]; then
                  echo "上传 favicon 到 OSS"
                  "$OSSUTIL_CMD" cp -f dist/favicon.png "$OSS_FAVICON_PATH" \
                    --meta Cache-Control:max-age=31536000,public
                fi

                if [ -d dist/icons ]; then
                  echo "上传 icons 到 OSS"
                  "$OSSUTIL_CMD" cp -rf dist/icons "$OSS_ICONS_PATH" \
                    --meta Cache-Control:max-age=31536000,public
                fi

                echo "Docker Login"
                echo "$CR_PWD" | docker login \
                  --username "$CR_USER_NAME" \
                  --password-stdin \
                  qy-prd-registry-vpc.cn-hangzhou.cr.aliyuncs.com

                IMAGE_TAG="${CI_COMMIT_ID}-${BUILD_NUMBER}"
                IMAGE="qy-prd-registry-vpc.cn-hangzhou.cr.aliyuncs.com/qy-prod/rf-mng-node:${IMAGE_TAG}"

                echo "Docker Build"
                echo "NGINX_IMAGE=$NGINX_IMAGE"
                docker build --build-arg NGINX_IMAGE="$NGINX_IMAGE" -t ${IMAGE} -f Dockerfile .

                echo "Docker Push"
                docker push ${IMAGE}

                echo "本次镜像: $IMAGE"

  stage2:
    name: "部署管理后台前端到 ACK"
    jobs:
      deploy_to_ack:
        name: "Deploy To ACK With Kubernetes Connection"
        runsOn:
          group: private/PMCrDXq0zBgals4t
          vm: true
        steps:
          render_manifest_step:
            name: "Render Manifest"
            step: Command
            with:
              run: |
                IMAGE_TAG="${CI_COMMIT_ID}-${BUILD_NUMBER}"
                IMAGE="qy-prd-registry-vpc.cn-hangzhou.cr.aliyuncs.com/qy-prod/rf-mng-node:${IMAGE_TAG}"
                MANIFEST_DIR=".manifest-rf-mng-node"
                MANIFEST_FILE="${MANIFEST_DIR}/rf-mng-node.yaml"

                mkdir -p "$MANIFEST_DIR"
                cp frontend/rf-mng-node/k8s/prod/rf-mng-node-deployment.yaml "$MANIFEST_FILE"
                printf '\n---\n' >> "$MANIFEST_FILE"
                cat frontend/rf-mng-node/k8s/prod/rf-mng-node-service.yaml >> "$MANIFEST_FILE"

                sed -i "s#RF_MNG_NODE_IMAGE_PLACEHOLDER#$IMAGE#g" "$MANIFEST_FILE"
                sed -i "s#APP_VERSION_PLACEHOLDER#$IMAGE_TAG#g" "$MANIFEST_FILE"

                echo "IMAGE=$IMAGE"
                grep image: "$MANIFEST_FILE"

          kubectl_apply_step:
            name: "Kubectl Apply"
            step: KubectlApply
            with:
              # Select the ACK cluster connection in Flow UI. The saved value should be
              # a real Flow Kubernetes cluster ID, not a placeholder.
              kubernetesCluster:
              kubectlVersion: "1.30.14"
              namespace: prod
              yamlPath: .manifest-rf-mng-node/rf-mng-node.yaml
              skipReplace: true
