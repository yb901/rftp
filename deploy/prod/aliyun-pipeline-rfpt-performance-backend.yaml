name: rfpt-performance-backend

sources:
  my_repo:
    type: codeup
    name: rfpt
    endpoint: RFPT_CODEUP_ENDPOINT_PLACEHOLDER
    branch: main
    certificate:
      type: serviceConnection
      serviceConnection: RFPT_CODEUP_SERVICE_CONNECTION_PLACEHOLDER

stages:
  stage1:
    name: "员工绩效后端构建并推送镜像"
    jobs:
      build_and_push:
        name: "Build And Push"
        runsOn:
          group: RFPT_YUNXIAO_RUNNER_GROUP_PLACEHOLDER
          vm: true
        steps:
          build_push_step:
            name: "Build Push"
            step: Command
            with:
              run: |
                set -e
                cd backend
                chmod +x ./gradlew
                ./gradlew :services:rfpt-performance:rfpt-performance-provider:clean :services:rfpt-performance:rfpt-performance-provider:bootJar -x test --no-daemon
                echo "$CR_PWD" | docker login --username "$CR_USER_NAME" --password-stdin "$ACR_REGISTRY"
                IMAGE_TAG="${CI_COMMIT_ID}-${BUILD_NUMBER}"
                IMAGE="${ACR_REGISTRY}/${ACR_NAMESPACE}/rfpt-performance:${IMAGE_TAG}"
                docker build --build-arg JAR_FILE=services/rfpt-performance/rfpt-performance-provider/build/libs/rfpt-performance-provider-1.0.0-SNAPSHOT.jar -t "$IMAGE" -f Dockerfile .
                docker push "$IMAGE"
                echo "IMAGE=$IMAGE"

  stage2:
    name: "部署员工绩效后端到 ACK"
    jobs:
      deploy_to_ack:
        name: "Deploy To ACK"
        runsOn:
          group: RFPT_YUNXIAO_RUNNER_GROUP_PLACEHOLDER
          vm: true
        steps:
          render_manifest_step:
            name: "Render Manifest"
            step: Command
            with:
              run: |
                set -e
                IMAGE_TAG="${CI_COMMIT_ID}-${BUILD_NUMBER}"
                IMAGE="${ACR_REGISTRY}/${ACR_NAMESPACE}/rfpt-performance:${IMAGE_TAG}"
                MANIFEST_DIR=".manifest-rfpt-performance"
                MANIFEST_FILE="${MANIFEST_DIR}/rfpt-performance.yaml"
                mkdir -p "$MANIFEST_DIR"
                cp backend/k8s/prod/rfpt-performance-deployment.yaml "$MANIFEST_FILE"
                printf '\n---\n' >> "$MANIFEST_FILE"
                cat backend/k8s/prod/rfpt-performance-service.yaml >> "$MANIFEST_FILE"
                sed -i "s#RFPT_PERFORMANCE_IMAGE_PLACEHOLDER#$IMAGE#g" "$MANIFEST_FILE"
                sed -i "s#APP_VERSION_PLACEHOLDER#$IMAGE_TAG#g" "$MANIFEST_FILE"
          kubectl_apply_step:
            name: "Kubectl Apply"
            step: KubectlApply
            with:
              kubernetesCluster: RFPT_ACK_CLUSTER_PLACEHOLDER
              kubectlVersion: "1.30.14"
              namespace: prod
              yamlPath: .manifest-rfpt-performance/rfpt-performance.yaml
              skipReplace: true
