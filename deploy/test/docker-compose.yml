services:
  rf-mng:
    build:
      context: ../../backend
      dockerfile: services/rf-mng/rf-mng-provider/Dockerfile
    image: ${RF_MNG_IMAGE:-rf-mng:test}
    container_name: ${RF_MNG_CONTAINER_NAME:-rf-mng-test}
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-test}
      RF_MNG_SERVER_PORT: 18091
      QY_NACOS_CONFIG_SERVER_ADDR: ${QY_NACOS_CONFIG_SERVER_ADDR}
      QY_APPCONF_NACOS_CONFIG_GROUP: ${QY_APPCONF_NACOS_CONFIG_GROUP:-config}
      QY_NACOS_NAMESPACE_QY: ${QY_NACOS_NAMESPACE_QY}
      QY_CONFIG_CRYPTO_SECRET_KEY: ${QY_CONFIG_CRYPTO_SECRET_KEY}
      JAVA_OPTS: ${RF_MNG_JAVA_OPTS:--Xms256m -Xmx512m}
    ports:
      - "${RF_MNG_PORT:-18091}:18091"
    networks:
      - rf-test

  rf-mng-web:
    build:
      context: ../../frontend/rf-mng-node
      dockerfile: Dockerfile
    image: ${RF_MNG_WEB_IMAGE:-rf-mng-web:test}
    container_name: ${RF_MNG_WEB_CONTAINER_NAME:-rf-mng-web-test}
    restart: unless-stopped
    depends_on:
      - rf-mng
    ports:
      - "${RF_MNG_WEB_PORT:-18092}:80"
    networks:
      - rf-test

networks:
  rf-test:
    name: ${RF_DOCKER_NETWORK:-rf-test}
