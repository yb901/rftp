# rf-mng 生产 Nacos 配置样例
# Data ID: rf-mng-prod.properties
# Group: config
# Namespace: 复用 zy_qy 的 ns-qy-appconf
#
# 敏感值请使用 SM4_密文，运行环境通过 QY_CONFIG_CRYPTO_SECRET_KEY 注入解密密钥。

# 平台主库 rf_pt
datasource.rf-pt.jdbc-url=jdbc:mysql://mysql.prod:3306/rf_pt?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
datasource.rf-pt.username=rf_pt
datasource.rf-pt.password=SM4_密文

# 机器人协作库 rf_robot
datasource.rf-robot.jdbc-url=jdbc:mysql://mysql.prod:3306/rf_robot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
datasource.rf-robot.username=rf_robot
datasource.rf-robot.password=SM4_密文

# 社保机器人协作表结构自动补齐
rf.robot.schema-init.enabled=true

# ID 编解码
id-codec.enabled=true

# 管理后台 Cookie
rf.mng.cookie.secret-key=SM4_密文
rf.mng.cookie.max-age=172800

# Primary OSS 访问地址前缀，需和 aliyun.oss.endpoints.primary.bucket 保持一致
rf-mng.oss-primary-access-url-prefix=https://rf-mng.oss-cn-hangzhou.aliyuncs.com

# Dubbo
dubbo.protocol.id=dubbo
dubbo.protocol.name=dubbo
dubbo.protocol.port=20891
dubbo.application.qos-port=22221
dubbo.scan.base-packages=com.rf.mng.provider.interfaces.remoteserviceimpl

# 数据库字段加密
db.encrypt.enabled=true
db.encrypt.log-level=error
db.encrypt.secrets.S1=SM4_密文
# tb_admin.otp_secret
db.encrypt.tables.tb_admin.columns.otp_secret.encryptor=S
db.encrypt.tables.tb_admin.columns.otp_secret.version=1
db.encrypt.tables.tb_admin.columns.otp_secret.start=true
