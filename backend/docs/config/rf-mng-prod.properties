# rf-mng 生产 Nacos 配置样例
# Data ID: rf-mng-prod.properties
# Group: config
# Namespace: 复用 zy_qy 的 ns-qy-appconf
#
# 敏感值请使用 SM4_密文，运行环境通过 QY_CONFIG_CRYPTO_SECRET_KEY 注入解密密钥。

# 平台主库 rf_pt
spring.datasource.platform.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.platform.url=jdbc:mysql://mysql.prod:3306/rf_pt?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.platform.username=rf_pt
spring.datasource.platform.password=SM4_密文

# 机器人协作库 rf_robot
spring.datasource.robot.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.robot.url=jdbc:mysql://mysql.prod:3306/rf_robot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.robot.username=rf_robot
spring.datasource.robot.password=SM4_密文

# 管理后台 Cookie
rf.mng.cookie.secret-key=SM4_密文
rf.mng.cookie.max-age=172800

# tax-browser-worker
rf.robot.tax.base-url=http://tax-browser-worker.prod:3220
rf.robot.tax.internal-token=SM4_密文
rf.robot.tax.timeout-millis=330000
