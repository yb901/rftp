# rf-performance 生产 Nacos 配置样例
# Data ID: rf-performance-prod.properties
# Group: config
# Namespace: 复用 zy_qy 的 ns-qy-appconf
#
# 敏感值请使用 SM4_密文，运行环境通过 QY_CONFIG_CRYPTO_SECRET_KEY 注入解密密钥。

# 平台主库 rf_pt
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://mysql.prod:3306/rf_pt?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=rf_pt
spring.datasource.password=SM4_密文

# MyBatis
mybatis.mapper-locations=classpath*:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# Dubbo
dubbo.protocol.name=dubbo
dubbo.protocol.port=20893

# 员工端 Web 登录
rf.performance.web.auth.cookie-max-age-seconds=604800

# 员工端短信与阿里云验证码，对齐 qy-mall.sms 命名结构，rf 项目使用独立前缀
rf-performance.sms.mock-enabled=false
rf-performance.sms.mock-code=123456
rf-performance.sms.access-key-id=SM4_密文
rf-performance.sms.access-key-secret=SM4_密文
rf-performance.sms.sign-name=请替换为短信签名
rf-performance.sms.template-code=请替换为短信模板CODE
rf-performance.sms.code-template-param-name=code

rf-performance.sms.captcha-region=cn
rf-performance.sms.captcha-prefix=SM4_密文
rf-performance.sms.captcha-scene-id=SM4_密文

# XXL-JOB
xxl.job.access-token=SM4_密文
xxl.job.executor.appname=rf-performance
xxl.job.executor.address=
xxl.job.executor.ip=
xxl.job.executor.port=9996
