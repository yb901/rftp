server.port=${RF_PERFORMANCE_SERVER_PORT:18093}
spring.application.name=rf-performance
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${RF_PLATFORM_DB_URL:jdbc:mysql://127.0.0.1:3306/rf_pt?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${RF_PLATFORM_DB_USERNAME:rf_pt}
spring.datasource.password=${RF_PLATFORM_DB_PASSWORD:}

mybatis.mapper-locations=classpath*:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

dubbo.application.name=rf-performance
dubbo.protocol.name=dubbo
dubbo.protocol.port=${RF_PERFORMANCE_DUBBO_PORT:20893}
dubbo.registry.address=${DUBBO_REGISTRY_ADDRESS:nacos://127.0.0.1:8848}

rf.performance.h5.auth.cookie-name=${RF_PERFORMANCE_H5_AUTH_COOKIE_NAME:RF_PERFORMANCE_MOBILE}
rf.performance.h5.auth.cookie-max-age-seconds=${RF_PERFORMANCE_H5_AUTH_COOKIE_MAX_AGE_SECONDS:604800}
rf.performance.h5.auth.mock-enabled=${RF_PERFORMANCE_H5_SMS_MOCK_ENABLED:true}
rf.performance.h5.auth.mock-code=${RF_PERFORMANCE_H5_SMS_MOCK_CODE:123456}
rf.performance.h5.auth.region-id=${RF_PERFORMANCE_H5_SMS_REGION_ID:cn-hangzhou}
rf.performance.h5.auth.endpoint=${RF_PERFORMANCE_H5_SMS_ENDPOINT:dysmsapi.aliyuncs.com}
rf.performance.h5.auth.access-key-id=${RF_PERFORMANCE_H5_SMS_ACCESS_KEY_ID:}
rf.performance.h5.auth.access-key-secret=${RF_PERFORMANCE_H5_SMS_ACCESS_KEY_SECRET:}
rf.performance.h5.auth.sign-name=${RF_PERFORMANCE_H5_SMS_SIGN_NAME:}
rf.performance.h5.auth.template-code=${RF_PERFORMANCE_H5_SMS_TEMPLATE_CODE:}
rf.performance.h5.auth.code-template-param-name=${RF_PERFORMANCE_H5_SMS_CODE_TEMPLATE_PARAM_NAME:code}
rf.performance.h5.auth.captcha-enabled=${RF_PERFORMANCE_H5_CAPTCHA_ENABLED:false}
rf.performance.h5.auth.captcha-region-id=${RF_PERFORMANCE_H5_CAPTCHA_REGION_ID:cn-shanghai}
rf.performance.h5.auth.captcha-endpoint=${RF_PERFORMANCE_H5_CAPTCHA_ENDPOINT:captcha.cn-shanghai.aliyuncs.com}
rf.performance.h5.auth.captcha-region=${RF_PERFORMANCE_H5_CAPTCHA_REGION:cn}
rf.performance.h5.auth.captcha-prefix=${RF_PERFORMANCE_H5_CAPTCHA_PREFIX:}
rf.performance.h5.auth.captcha-scene-id=${RF_PERFORMANCE_H5_CAPTCHA_SCENE_ID:}
rf.performance.h5.auth.captcha-language=${RF_PERFORMANCE_H5_CAPTCHA_LANGUAGE:cn}
rf.performance.h5.auth.captcha-js-url=${RF_PERFORMANCE_H5_CAPTCHA_JS_URL:https://o.alicdn.com/captcha-frontend/aliyunCaptcha/AliyunCaptcha.js}

#xxl.job.admin.addresses=${XXL_JOB_ADMIN_ADDRESSES:http://127.0.0.1:8080/xxl-job-admin}
#xxl.job.executor.logpath=${XXL_JOB_EXECUTOR_LOG_PATH:${LOG_PATH:${user.home}/logs/${spring.application.name}}/xxl-job}
xxl.job.access-token=${RF_PERFORMANCE_JOB_XXL_ACCESS_TOKEN:${XXL_JOB_ACCESS_TOKEN:}}
xxl.job.executor.appname=${RF_PERFORMANCE_JOB_XXL_EXECUTOR_APPNAME:rf-performance}
xxl.job.executor.address=${RF_PERFORMANCE_JOB_XXL_EXECUTOR_ADDRESS:}
xxl.job.executor.ip=${RF_PERFORMANCE_JOB_XXL_EXECUTOR_IP:}
xxl.job.executor.port=${RF_PERFORMANCE_JOB_XXL_EXECUTOR_PORT:9996}
xxl.job.executor.logretentiondays=${RF_PERFORMANCE_JOB_XXL_EXECUTOR_LOG_RETENTION_DAYS:30}
