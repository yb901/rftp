server.port=${RF_MNG_SERVER_PORT:18091}
spring.application.name=rf-mng
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.config.import=optional:nacos:common-backend-${spring.profiles.active}.properties?group=${QY_APPCONF_NACOS_CONFIG_GROUP:config},optional:nacos:${spring.application.name}-${spring.profiles.active}.properties?group=${QY_APPCONF_NACOS_CONFIG_GROUP:config}
spring.cloud.nacos.config.server-addr=${QY_NACOS_CONFIG_SERVER_ADDR:192.168.110.192:8848}
spring.cloud.nacos.config.group=${QY_APPCONF_NACOS_CONFIG_GROUP:config}
spring.cloud.nacos.config.namespace=${QY_NACOS_NAMESPACE_QY:ns-qy-appconf}
spring.cloud.nacos.config.file-extension=properties
