server.port=${RF_MNG_SERVER_PORT:18091}
spring.application.name=rf-mng
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.datasource.platform.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.platform.url=${RF_PLATFORM_DB_URL:jdbc:mysql://127.0.0.1:3306/rf_pt?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.platform.username=${RF_PLATFORM_DB_USERNAME:rf_pt}
spring.datasource.platform.password=${RF_PLATFORM_DB_PASSWORD:}

spring.datasource.robot.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.robot.url=${RF_ROBOT_DB_URL:jdbc:mysql://127.0.0.1:3306/rf_robot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.robot.username=${RF_ROBOT_DB_USERNAME:rf_robot}
spring.datasource.robot.password=${RF_ROBOT_DB_PASSWORD:}

dubbo.application.name=rf-mng
dubbo.registry.address=${DUBBO_REGISTRY_ADDRESS:nacos://127.0.0.1:8848}

rf.robot.tax.base-url=${RF_TAX_ROBOT_BASE_URL:http://127.0.0.1:3301}
rf.robot.tax.internal-token=${RF_TAX_ROBOT_INTERNAL_TOKEN:}
rf.robot.tax.timeout-millis=${RF_TAX_ROBOT_TIMEOUT_MILLIS:330000}
