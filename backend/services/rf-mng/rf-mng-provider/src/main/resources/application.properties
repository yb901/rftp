server.port=${RF_MNG_SERVER_PORT:18091}
spring.application.name=rf-mng
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${RF_DB_URL:jdbc:mysql://127.0.0.1:3306/rf_tax?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${RF_DB_USERNAME:rf_tax}
spring.datasource.password=${RF_DB_PASSWORD:}

mybatis.mapper-locations=classpath*:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

dubbo.application.name=rf-mng
dubbo.registry.address=${DUBBO_REGISTRY_ADDRESS:nacos://127.0.0.1:8848}

rf.robot.tax.base-url=${RF_TAX_ROBOT_BASE_URL:http://127.0.0.1:3301}
rf.robot.tax.internal-token=${RF_TAX_ROBOT_INTERNAL_TOKEN:}
rf.robot.tax.timeout-millis=${RF_TAX_ROBOT_TIMEOUT_MILLIS:330000}
