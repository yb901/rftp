server.port=${RFPT_MNG_SERVER_PORT:18091}
spring.application.name=rfpt-mng
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${RFPT_DB_URL:jdbc:mysql://127.0.0.1:3306/rf_tax?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${RFPT_DB_USERNAME:rf_tax}
spring.datasource.password=${RFPT_DB_PASSWORD:}

mybatis.mapper-locations=classpath*:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

rfpt.robot.tax.base-url=${RFPT_TAX_ROBOT_BASE_URL:http://127.0.0.1:3301}
rfpt.robot.tax.internal-token=${RFPT_TAX_ROBOT_INTERNAL_TOKEN:}
rfpt.robot.tax.timeout-millis=${RFPT_TAX_ROBOT_TIMEOUT_MILLIS:330000}
