server.port=${RFPT_PERFORMANCE_SERVER_PORT:18093}
spring.application.name=rfpt-performance
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${RFPT_DB_URL:jdbc:mysql://127.0.0.1:3306/rf_tax?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${RFPT_DB_USERNAME:rf_tax}
spring.datasource.password=${RFPT_DB_PASSWORD:}

mybatis.mapper-locations=classpath*:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

dubbo.application.name=rfpt-performance
dubbo.protocol.name=dubbo
dubbo.protocol.port=${RFPT_PERFORMANCE_DUBBO_PORT:20893}
dubbo.registry.address=${DUBBO_REGISTRY_ADDRESS:nacos://127.0.0.1:8848}

rfpt.performance.h5.auth.cookie-name=${RFPT_PERFORMANCE_H5_AUTH_COOKIE_NAME:RFPT_PERFORMANCE_MOBILE}
rfpt.performance.h5.auth.cookie-max-age-seconds=${RFPT_PERFORMANCE_H5_AUTH_COOKIE_MAX_AGE_SECONDS:604800}
rfpt.performance.h5.auth.mock-enabled=${RFPT_PERFORMANCE_H5_SMS_MOCK_ENABLED:true}
rfpt.performance.h5.auth.mock-code=${RFPT_PERFORMANCE_H5_SMS_MOCK_CODE:123456}
rfpt.performance.h5.auth.region-id=${RFPT_PERFORMANCE_H5_SMS_REGION_ID:cn-hangzhou}
rfpt.performance.h5.auth.endpoint=${RFPT_PERFORMANCE_H5_SMS_ENDPOINT:dysmsapi.aliyuncs.com}
rfpt.performance.h5.auth.access-key-id=${RFPT_PERFORMANCE_H5_SMS_ACCESS_KEY_ID:}
rfpt.performance.h5.auth.access-key-secret=${RFPT_PERFORMANCE_H5_SMS_ACCESS_KEY_SECRET:}
rfpt.performance.h5.auth.sign-name=${RFPT_PERFORMANCE_H5_SMS_SIGN_NAME:}
rfpt.performance.h5.auth.template-code=${RFPT_PERFORMANCE_H5_SMS_TEMPLATE_CODE:}
rfpt.performance.h5.auth.code-template-param-name=${RFPT_PERFORMANCE_H5_SMS_CODE_TEMPLATE_PARAM_NAME:code}
rfpt.performance.h5.auth.captcha-enabled=${RFPT_PERFORMANCE_H5_CAPTCHA_ENABLED:false}
rfpt.performance.h5.auth.captcha-region-id=${RFPT_PERFORMANCE_H5_CAPTCHA_REGION_ID:cn-shanghai}
rfpt.performance.h5.auth.captcha-endpoint=${RFPT_PERFORMANCE_H5_CAPTCHA_ENDPOINT:captcha.cn-shanghai.aliyuncs.com}
rfpt.performance.h5.auth.captcha-region=${RFPT_PERFORMANCE_H5_CAPTCHA_REGION:cn}
rfpt.performance.h5.auth.captcha-prefix=${RFPT_PERFORMANCE_H5_CAPTCHA_PREFIX:}
rfpt.performance.h5.auth.captcha-scene-id=${RFPT_PERFORMANCE_H5_CAPTCHA_SCENE_ID:}
rfpt.performance.h5.auth.captcha-language=${RFPT_PERFORMANCE_H5_CAPTCHA_LANGUAGE:cn}
rfpt.performance.h5.auth.captcha-js-url=${RFPT_PERFORMANCE_H5_CAPTCHA_JS_URL:https://o.alicdn.com/captcha-frontend/aliyunCaptcha/AliyunCaptcha.js}

#xxl.job.admin.addresses=${XXL_JOB_ADMIN_ADDRESSES:http://127.0.0.1:8080/xxl-job-admin}
#xxl.job.executor.logpath=${XXL_JOB_EXECUTOR_LOG_PATH:${LOG_PATH:${user.home}/logs/${spring.application.name}}/xxl-job}
xxl.job.access-token=${RFPT_PERFORMANCE_JOB_XXL_ACCESS_TOKEN:${XXL_JOB_ACCESS_TOKEN:}}
xxl.job.executor.appname=${RFPT_PERFORMANCE_JOB_XXL_EXECUTOR_APPNAME:rfpt-performance}
xxl.job.executor.address=${RFPT_PERFORMANCE_JOB_XXL_EXECUTOR_ADDRESS:}
xxl.job.executor.ip=${RFPT_PERFORMANCE_JOB_XXL_EXECUTOR_IP:}
xxl.job.executor.port=${RFPT_PERFORMANCE_JOB_XXL_EXECUTOR_PORT:9996}
xxl.job.executor.logretentiondays=${RFPT_PERFORMANCE_JOB_XXL_EXECUTOR_LOG_RETENTION_DAYS:30}
