apiVersion: apps/v1
kind: Deployment
metadata:
  name: rf-mng
  namespace: prod
  labels:
    app.kubernetes.io/name: rf-mng
    app.kubernetes.io/part-of: rf
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rf-mng
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rf-mng
        app.kubernetes.io/part-of: rf
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: rf-mng
          image: RF_MNG_IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 18091
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: LOG_PATH
              value: /app/logs
            - name: APP_VERSION
              value: APP_VERSION_PLACEHOLDER
            - name: RF_PLATFORM_DB_URL
              valueFrom:
                secretKeyRef:
                  name: rf-platform-db-secret
                  key: url
            - name: RF_PLATFORM_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rf-platform-db-secret
                  key: username
            - name: RF_PLATFORM_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rf-platform-db-secret
                  key: password
            - name: RF_ROBOT_DB_URL
              valueFrom:
                secretKeyRef:
                  name: rf-robot-db-secret
                  key: url
            - name: RF_ROBOT_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rf-robot-db-secret
                  key: username
            - name: RF_ROBOT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rf-robot-db-secret
                  key: password
            - name: DUBBO_REGISTRY_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: rf-backend-config
                  key: dubbo-registry-address
            - name: JAVA_OPS
              value: "-Xms512m -Xmx1g -XX:MetaspaceSize=128m -XX:MaxMetaspaceSize=256m -XX:+UseZGC -XX:+ZGenerational -XX:+UseStringDeduplication -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/app/logs -XX:+ExitOnOutOfMemoryError -Dfile.encoding=UTF-8 -Duser.timezone=Asia/Shanghai -Duser.home=/app"
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
