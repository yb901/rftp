apiVersion: apps/v1
kind: Deployment
metadata:
  name: rfpt-performance
  namespace: prod
  labels:
    app.kubernetes.io/name: rfpt-performance
    app.kubernetes.io/part-of: rfpt
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rfpt-performance
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rfpt-performance
        app.kubernetes.io/part-of: rfpt
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: rfpt-performance
          image: RFPT_PERFORMANCE_IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 18093
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: LOG_PATH
              value: /app/logs
            - name: APP_VERSION
              value: APP_VERSION_PLACEHOLDER
            - name: RFPT_PERFORMANCE_H5_SMS_MOCK_ENABLED
              value: "false"
            - name: RFPT_PERFORMANCE_H5_CAPTCHA_ENABLED
              value: "true"
            - name: RFPT_DB_URL
              valueFrom:
                secretKeyRef:
                  name: rfpt-backend-db-secret
                  key: url
            - name: RFPT_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rfpt-backend-db-secret
                  key: username
            - name: RFPT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rfpt-backend-db-secret
                  key: password
            - name: DUBBO_REGISTRY_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: rfpt-backend-config
                  key: dubbo-registry-address
            - name: XXL_JOB_ADMIN_ADDRESSES
              valueFrom:
                configMapKeyRef:
                  name: rfpt-backend-config
                  key: xxl-job-admin-addresses
            - name: RFPT_PERFORMANCE_H5_SMS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: rfpt-performance-aliyun-secret
                  key: sms-access-key-id
            - name: RFPT_PERFORMANCE_H5_SMS_ACCESS_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: rfpt-performance-aliyun-secret
                  key: sms-access-key-secret
            - name: RFPT_PERFORMANCE_H5_SMS_SIGN_NAME
              valueFrom:
                secretKeyRef:
                  name: rfpt-performance-aliyun-secret
                  key: sms-sign-name
            - name: RFPT_PERFORMANCE_H5_SMS_TEMPLATE_CODE
              valueFrom:
                secretKeyRef:
                  name: rfpt-performance-aliyun-secret
                  key: sms-template-code
            - name: RFPT_PERFORMANCE_H5_CAPTCHA_PREFIX
              valueFrom:
                secretKeyRef:
                  name: rfpt-performance-aliyun-secret
                  key: captcha-prefix
            - name: RFPT_PERFORMANCE_H5_CAPTCHA_SCENE_ID
              valueFrom:
                secretKeyRef:
                  name: rfpt-performance-aliyun-secret
                  key: captcha-scene-id
            - name: JAVA_OPS
              value: "-Xms512m -Xmx1g -XX:MetaspaceSize=128m -XX:MaxMetaspaceSize=256m -XX:+UseZGC -XX:+ZGenerational -XX:+UseStringDeduplication -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/app/logs -XX:+ExitOnOutOfMemoryError -Dfile.encoding=UTF-8 -Duser.timezone=Asia/Shanghai -Duser.home=/app"
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
