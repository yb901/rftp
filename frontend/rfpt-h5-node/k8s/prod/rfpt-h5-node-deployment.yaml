apiVersion: apps/v1
kind: Deployment
metadata:
  name: rfpt-h5-node
  namespace: prod
  labels:
    app.kubernetes.io/name: rfpt-h5-node
    app.kubernetes.io/part-of: rfpt
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rfpt-h5-node
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rfpt-h5-node
        app.kubernetes.io/part-of: rfpt
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: rfpt-h5-node
          image: RFPT_H5_NODE_IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: APP_VERSION
              value: APP_VERSION_PLACEHOLDER
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
